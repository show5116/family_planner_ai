domain: "task"
tools:
  - name: "create_task_draft"
    description: "사용자의 자연어 요청에서 일정, 방문, 행사 또는 할 일(Task) 정보를 추출하여 구조화된 JSON 데이터로 번역합니다. 사용자가 달력을 추가하거나 할일을 등록해 달라고 요청할 때 반드시 호출해야 합니다."
    module: "app.tools.task"
    function: "create_task_draft"
    prompt: |
      [도구 사용 규칙 및 주의사항]
      1. 사용자의 자연어를 분석하여 누락된 필수 정보가 있다면 먼저(도구를 호출하지 말고) 대화로 물어보세요. (예: "언제까지 완료해야 할까요?")
      2. type: 시간 점유 중심이면 CALENDAR_ONLY, 물건 구매나 청소 등 달성/완수 처리가 중요하면 TODO_LINKED를 사용하세요.
      3. scheduled_at (시작/알림 일시)와 due_at (마감 일시)는 ISO 8601 형식(예: 2026-03-27T15:00:00+09:00)으로 변환하세요.
         - 사용자가 말한 상대적인 요일(예: '이번 주 금요일')을 파악하기 위해 시스템 프롬프트에 주입된 오늘 날짜를 기준으로 추론하세요.
      4. participants: 텍스트에 등장하는 담당자나 참여자의 이름/호칭(예: 아내, 남편, 하민이)을 배열로 담아주세요. 지정되지 않았다면 빈 배열 []로 둡니다.
    parameters:
      type: "object"
      properties:
        title:
          type: "string"
          description: "일정 또는 할 일의 제목 (예: '하민이 기저귀 쿠팡에서 주문')"
        type:
          type: "string"
          enum: ["TODO_LINKED", "CALENDAR_ONLY"]
          description: "일정의 유형. 일반 일정은 CALENDAR_ONLY, 체크리스트형 할일은 TODO_LINKED"
        scheduled_at:
          type: "string"
          description: "일정이 시작되거나, D-Day 알림을 시작해야 하는 기준 일시 (ISO 8601 형식). 명시되지 않았다면 due_at과 동일하게 설정하거나 현재 시각으로 설정합니다."
        due_at:
          type: "string"
          description: "일정의 마감 일시 (ISO 8601 형식). 예정된 시작일과 마감일이 같다면 scheduled_at과 동일하게 설정합니다."
        participants:
          type: "array"
          items:
            type: "string"
          description: "일정에 참여하거나 책임을 지는 사람들의 이름 또는 호칭 목록"
        notes:
          type: "string"
          description: "추가적인 메모나 세부 사항 사항"
      required: ["title", "type", "scheduled_at", "due_at", "participants"]
